<div class="table-responsive">
    <table class="table table-hover">
        <thead>
            <tr>
                <th>
                    <input id="all" type="checkbox" class="filled-in">
                    <label class="m-b--10" for="all"></label>
                </th>
                {% for header in headers %}
                <th>{{ header }}</th>            
                {% endfor %}
            </tr>
        </thead>
        <tbody>
        	{% for list in data %}        
            <tr>
                <td class="col-xs-1">
                    <input  id="{{ forloop.counter }}" type="checkbox" class="filled-in">
                    <label for="{{ forloop.counter }}"></label>
                </td>
                {% for item in list %}
                <td>{{ item }}</td>
                {% endfor %}
            </tr>
            {% empty %}
    		<tr>
                <td colspan="{{ headers|length|add:'1' }}">Sin registros.</td>
            </tr>
            {% endfor %}            
        </tbody>
    </table>    
</div>
